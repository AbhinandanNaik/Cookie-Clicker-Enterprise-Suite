server.port=${PORT:8080}

# File-Based Database Persistence
spring.datasource.url=jdbc:h2:file:./data/cookie_clicker;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Console Logging
logging.level.org.springframework.security=INFO
logging.level.com.cookieclicker.backend=INFO

# Security Config
# 256-bit secret key (HS256 requirement: at least 32 bytes/characters)
jwt.secret=enterpriseCookieClickerSecretKeySuperSecureHS256Algorithm2026!
jwt.expiration=86400000
